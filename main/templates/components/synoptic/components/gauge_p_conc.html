<!-- ── P CONCENTRAT (bottom-right area gauge) ─────────────────── -->
<div class="syn-block syn-gauge" id="syn-p-conc" style="left:70%;top:82%"
     onclick="SynopticHMI.openPanel('instruments','Pression Concentrat')">
    <div class="syn-box syn-box--gauge" style="min-width:70px;text-align:center">
        <div class="syn-label">P Concentrat</div>
        <div class="syn-gauge-ring" id="gauge-ring-p-conc">
            <div class="syn-gauge-face">
                <div class="syn-value pressure" id="syn-val-p-conc">
                    --<span class="syn-unit">Bar</span>
                </div>
            </div>
        </div>
    </div>
</div>
