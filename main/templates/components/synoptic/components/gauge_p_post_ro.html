<!-- ── P POST-MEMBRANES (permeate side gauge) ─────────────────── -->
<div class="syn-block syn-gauge" id="syn-p-post-ro" style="left:56%;top:13%"
     onclick="SynopticHMI.openPanel('instruments','Pression Post-RO')">
    <div class="syn-box syn-box--gauge" style="min-width:70px;text-align:center">
        <div class="syn-label">P Post-RO</div>
        <div class="syn-gauge-ring" id="gauge-ring-p-post-ro">
            <div class="syn-gauge-face">
                <div class="syn-value pressure" id="syn-val-p-post-ro">
                    --<span class="syn-unit">Bar</span>
                </div>
            </div>
        </div>
    </div>
</div>
