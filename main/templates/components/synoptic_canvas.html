<!--
  ════════════════════════════════════════════════════════════════
  synoptic_canvas.html  —  Thermeco Industrie SCADA/HMI

  Rebuilt as a true SVG technical drawing (v1's exact visual style:
  tank shells, layered cylinder caps, membrane vessels with visible
  elements, circular fan-bladed HP pump, butterfly valves, zone
  separators, pipe network with flow arrows) using v1's coordinate
  layout (1020×510 viewBox) as ground truth.

  Two layers, perfectly aligned:
    1. <svg id="pipe-svg">  — all static artwork: pipes, tanks,
       gauges, filters, membranes, valves, zone lines. Pure drawing,
       no dynamic content, mirrors v1 1:1.
    2. HTML overlay (.syn-block, position:absolute, same coordinate
       space as the SVG) — every id/class synoptic.js reads or
       writes (tank-raw-fill, dp-bar-sand, dot-hp-pump, syn-val-*,
       etc.) plus the click targets (openPanel / showView /
       backwash modal). This is necessary because synoptic.js sets
       `el.style.height = 'X%'` / `el.style.width = 'X%'`, which
       behaves correctly on HTML block elements but not reliably on
       raw SVG <rect> percentage sizing — so dynamic fills/bars stay
       as HTML divs stacked exactly on top of the SVG artwork.

  Wiring preserved (unchanged from synoptic.js):
    - openPanel('compId', 'Title')   → opens #detail-panel
    - showView('vfd')                → HP pump click → VFD tab directly
    - #backwash-modal .open          → sand filter backwash button
    - every #id inside updateSynoptic() exists exactly once below.

  NOTE ON CSS: the old .loc-* pixel rules in synoptic.css positioned
  components on v2's looser grid. This file uses v1's coordinates
  instead (see comment block at file end for the small CSS update
  needed — the .loc-* selectors can be deleted/ignored since every
  block below carries its own inline position matching the SVG).
  ════════════════════════════════════════════════════════════════
-->
