<!-- ── P BASSE PRESSION (bottom center-left gauge) ────────────── -->
<div class="syn-block syn-gauge" id="syn-p-low" style="left:32%;top:79%"
     onclick="SynopticHMI.openPanel('instruments','Pression Basse')">
    <div class="syn-box syn-box--gauge" style="min-width:70px;text-align:center">
        <div class="syn-label">P Basse</div>
        <div class="syn-gauge-ring" id="gauge-ring-p-low">
            <div class="syn-gauge-face">
                <div class="syn-value pressure" id="syn-val-p-low">
                    --<span class="syn-unit">Bar</span>
                </div>
            </div>
        </div>
    </div>
</div>
