<!-- ── P HP SORTIE (top-right gauge) ──────────────────────────── -->
<div class="syn-block syn-gauge" id="syn-p-hp-top" style="left:83%;top:4%"
     onclick="SynopticHMI.openPanel('instruments','Pression HP')">
    <div class="syn-box syn-box--gauge" style="min-width:70px;text-align:center">
        <div class="syn-label">P HP</div>
        <div class="syn-gauge-ring" id="gauge-ring-p-hp-out">
            <div class="syn-gauge-face">
                <div class="syn-value pressure" id="syn-val-p-hp-out">
                    --<span class="syn-unit">Bar</span>
                </div>
            </div>
        </div>
    </div>
</div>
