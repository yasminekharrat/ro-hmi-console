<!--
  ════════════════════════════════════════════════════════════════
  synoptic_canvas.html  —  Thermeco Industrie SCADA/HMI
  Rebuilt v3: viewBox 1600×620, preserveAspectRatio="none"
  Full-screen canvas with 5 process zones, 4 sand-filter EV valves,
  corrected HP pump click (openPanel, not showView), and all
  synoptic.js IDs preserved exactly.
  ════════════════════════════════════════════════════════════════
-->

<main id="view-synoptic" class="w-full flex-grow flex flex-col overflow-hidden src-view-component">

    <div id="synoptic-canvas" class="flex-grow flex flex-col" style="position:relative; background:#D2D8DA;">
        <div id="view-overview" class="flex-grow relative overflow-hidden select-none" style="min-height:520px;">

            <!-- ══════════════════════════════════════════════════════
                 LAYER 1 — STATIC SVG ARTWORK
                 viewBox 0 0 1600 620, preserveAspectRatio="none"
                 CRITICAL: "none" is required so HTML overlay percentage
                 positions stay perfectly aligned with SVG artwork at
                 any container size.
                 ══════════════════════════════════════════════════════ -->
            <svg id="pipe-svg" viewBox="0 0 1600 620" preserveAspectRatio="none"
                 style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0;">

                <defs>
                    <style>
                        .syn-box      { fill:#C4CDD0; stroke:#7F8C8D; stroke-width:1; }
                        .syn-box-dark { fill:#96A0A5; stroke:#5A6A70; stroke-width:1; }
                        .syn-label    { font-family:'Segoe UI',Arial,sans-serif; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; fill:#334155; }
                        .syn-id       { font-family:'Segoe UI',Arial,sans-serif; font-size:8.5px; fill:#4A5568; font-weight:600; letter-spacing:0.05em; }
                        .syn-zone-label { font-family:'Segoe UI',Arial,sans-serif; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.14em; fill:#7A9AA5; }
                        .zone-sep     { stroke:#A8B4B8; stroke-width:0.8; stroke-dasharray:6 5; opacity:0.6; }
                        .pump-spin    { animation: spin-pump 2.2s linear infinite; }
                        @keyframes spin-pump { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
                        .gauge-box    { fill:#BDC8CC; stroke:#7F8C8D; stroke-width:1; }
                        .gauge-label  { font-family:'Segoe UI',Arial,sans-serif; font-size:7.5px; fill:#475569; font-weight:700; text-transform:uppercase; }
                        .pipe-feed    { stroke:#5A6A70; stroke-linecap:round; }
                        .pipe-perm    { stroke:#2B6E7A; stroke-linecap:round; }
                        .pipe-conc    { stroke:#7A5A3A; stroke-linecap:round; stroke-dasharray:8 4; }
                    </style>

                    <!-- Gradient for tank raw water fill reference in SVG (not used for level; HTML handles that) -->
                    <linearGradient id="grad-tank-raw" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#A8B6BC"/>
                        <stop offset="100%" stop-color="#C4CDD0"/>
                    </linearGradient>

                    <!-- Gradient for permeate tank -->
                    <linearGradient id="grad-tank-perm" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#1A5A6A"/>
                        <stop offset="100%" stop-color="#2B7A8C"/>
                    </linearGradient>

                    <!-- Gradient for HP pump body -->
                    <radialGradient id="grad-hp-pump" cx="40%" cy="38%">
                        <stop offset="0%" stop-color="#2A3F52"/>
                        <stop offset="100%" stop-color="#101820"/>
                    </radialGradient>

                    <!-- Filter body gradient -->
                    <linearGradient id="grad-filter" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#C8D3D7"/>
                        <stop offset="40%" stop-color="#DFE6E9"/>
                        <stop offset="70%" stop-color="#BEC9CD"/>
                        <stop offset="100%" stop-color="#A8B4B8"/>
                    </linearGradient>
                </defs>

                <!-- ══ ZONE SEPARATORS ══ -->
