<!-- ── CUVE PERMÉAT (tall left-side tank) ────────────────────── -->
<div class="syn-block" id="syn-tank-permeat" style="left:1%;top:18%"
     onclick="SynopticHMI.openPanel('tanks','Réservoir Perméat')">
    <div class="syn-box syn-box--tank-tall" style="min-width:70px;text-align:center">
        <div class="syn-label mb-1">Cuve Perméat</div>
        <div class="tank-shell tank-shell--tall mx-auto mb-1" id="tank-permeat-shell">
            <div class="tank-fill" id="tank-permeat-fill" style="height:0%"></div>
            <div class="tank-pct"  id="tank-permeat-pct">--</div>
        </div>
        <div class="flex items-center justify-center gap-1">
            <span class="syn-status-dot" id="dot-tank-high"></span>
            <span style="font-size:7px;color:#64748B">NIVEAU</span>
        </div>
    </div>
</div>
