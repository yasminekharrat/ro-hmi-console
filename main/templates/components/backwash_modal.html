

<div id="backwash-modal" class="modal-overlay">
    <div class="modal-box">
        <div class="bg-[#4D555A] text-white px-4 py-3 flex justify-between items-center border-b-2 border-[#2F3437]">
            <span class="font-bold text-sm uppercase tracking-wider"><i class="fa-solid fa-arrows-rotate mr-2 text-amber-400"></i>Paramètres Contre-Lavage</span>
            <button onclick="document.getElementById('backwash-modal').classList.remove('open')" class="text-[#A9B3B8] hover:text-white text-lg font-bold">✕</button>
        </div>
        <div class="p-5">
            <div class="space-y-4 text-sm text-[#CBD5E1]">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-[#94A3B8] mb-1">ΔP Seuil Déclenchement (Bar)</label>
                    <input type="number" id="bw-dp-threshold" step="0.1" value="0.5" min="0" max="3" class="w-full bg-[#141A1C] text-[#00FFD5] border border-[#374151] px-3 py-2 plc-mono text-sm rounded outline-none focus:border-[#00FFD5]">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-[#94A3B8] mb-1">Durée Contre-Lavage (min)</label>
                    <input type="number" id="bw-duration" step="1" value="5" min="1" max="60" class="w-full bg-[#141A1C] text-[#00FFD5] border border-[#374151] px-3 py-2 plc-mono text-sm rounded outline-none focus:border-[#00FFD5]">
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="SynopticHMI.applyBackwashSettings()" class="wincc-btn flex-1 bg-[#1D4ED8] hover:bg-[#2563EB] text-white font-bold py-2 text-xs border border-[#1E3A8A] uppercase tracking-wider">
                        <i class="fa-solid fa-floppy-disk mr-1.5"></i>Appliquer
                    </button>
                    <button onclick="SynopticHMI.startManualBackwash()" class="wincc-btn flex-1 bg-[#B45309] hover:bg-[#D97706] text-white font-bold py-2 text-xs border border-[#78350F] uppercase tracking-wider">
                        <i class="fa-solid fa-arrows-rotate mr-1.5"></i>Lancer Manuellement
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
