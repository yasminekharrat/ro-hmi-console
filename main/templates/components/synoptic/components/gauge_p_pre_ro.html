<!-- ── P PRÉ-MEMBRANES (pre-RO gauge) ─────────────────────────── -->
<div class="syn-block syn-gauge" id="syn-p-pre-ro" style="left:36%;top:13%"
     onclick="SynopticHMI.openPanel('instruments','Pression Pré-RO')">
    <div class="syn-box syn-box--gauge" style="min-width:70px;text-align:center">
        <div class="syn-label">P Pré-RO</div>
        <div class="syn-gauge-ring" id="gauge-ring-p-pre-ro">
            <div class="syn-gauge-face">
                <div class="syn-value pressure" id="syn-val-p-pre-ro">
                    --<span class="syn-unit">Bar</span>
                </div>
            </div>
        </div>
    </div>
</div>
