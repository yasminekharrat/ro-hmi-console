<!-- ── CUVE FLUSHING (small bottom-left tank) ─────────────────── -->
<div class="syn-block" id="syn-tank-flush" style="left:10%;top:74%"
     onclick="SynopticHMI.openPanel('tanks','Cuve Flushing')">
    <div class="syn-box" style="min-width:62px;text-align:center">
        <div class="syn-label mb-1">Flushing</div>
        <div class="tank-shell mx-auto mb-1" id="tank-flush-shell">
            <div class="tank-fill" id="tank-flush-fill" style="height:0%"></div>
            <div class="tank-pct"  id="tank-flush-pct">--</div>
        </div>
        <span class="syn-status-dot" id="dot-flush"></span>
    </div>
</div>
